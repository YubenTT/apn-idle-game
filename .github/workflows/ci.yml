name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

jobs:
  test:
    name: Domain tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install asset tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg webp

      - name: Run headless tests
        run: node qa/run-tests.mjs

      - name: Verify entrypoints exist
        run: |
          test -f index.html
          test -f js/main.js
          test -f js/game.js
          test -f js/formulas.js
          test -f css/game.css
          test -f assets/mascot-host.png
          test -d assets/enemies
          test -d assets/icons
