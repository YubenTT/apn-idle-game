<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0d1217" />
    <meta name="color-scheme" content="dark" />
    <title>APN Idle</title>
    <link rel="icon" href="./assets/apn-logo.svg" />
    <link rel="stylesheet" href="./css/game.css?v=bag2" />
  </head>
  <body>
    <div id="app">
      <header class="hud-top">
        <div class="hud-brand">
          <strong class="hud-title">APN <span>Idle</span></strong>
          <div class="hud-meta" role="status">
            <span id="v-combo" class="meta-pill combo" hidden></span>
            <span class="meta-pill" title="Economy mult (Live × Pro × Boost)"><span class="meta-k">×</span><em id="v-live">1.00</em></span>
            <span class="meta-pill pro-badge" id="v-pro" hidden title="APN Pro">PRO</span>
            <span class="meta-pill sp" title="Unspent skill points"><em id="v-sp">0</em><span class="meta-k">sp</span></span>

          </div>
        </div>
        <div class="hud-res">
          <div class="chip" title="Signal — Upgrade Weapon">
            <strong id="v-bytes">0</strong><small>sig</small>
          </div>
          <div class="chip" title="Notes — Ship for Rep">
            <strong id="v-patches">0</strong><small>notes</small>
          </div>
          <div class="chip" title="Rep — permanent Boosts">
            <strong id="v-auth">0</strong><small>rep</small>
          </div>
          <div class="chip" title="Damage per second">
            <strong id="v-dps">0</strong><small>dps</small>
          </div>
        </div>
      </header>

      <div class="hud-ticker">
        <div class="live-tag">LIVE</div>
        <div class="ticker-clip"><div class="ticker-track" id="ticker-track"></div></div>
      </div>

      <main class="hud-stage">
        <div class="stage-hud" aria-hidden="false">
          <div class="stage-stat zone">
            <div class="stage-stat-top">
              <span class="stage-stat-lab">ZONE <em id="v-zone">1</em></span>
              <span class="stage-stat-val" id="v-kills">0/5</span>
            </div>
            <div class="stage-stat-track"><i id="bar-zone" class="zone"></i></div>
          </div>
          <div class="stage-stat rank">
            <div class="stage-stat-top">
              <span class="stage-stat-lab">RANK <em id="v-level">1</em></span>
              <span class="stage-stat-val" id="v-xp-lab">0</span>
            </div>
            <div class="stage-stat-track"><i id="bar-xp" class="xp"></i></div>
          </div>
        </div>
        <canvas id="game"></canvas>
        <!-- In-stage bag FAB (Gear) — left rail, not bottom nav -->
        <button type="button" class="bag-fab" id="btn-bag" data-panel="gear" title="Gear · Inventory" aria-label="Open Gear">
          <svg class="bag-fab-ico" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M8 7V6a4 4 0 018 0v1h3.2c.7 0 1.3.6 1.3 1.3v10.4c0 1.3-1 2.3-2.3 2.3H5.8c-1.3 0-2.3-1-2.3-2.3V8.3C3.5 7.6 4.1 7 4.8 7H8zm2 0h4V6a2 2 0 10-4 0v1zm-3.5 4.5h11v7.2c0 .2-.1.3-.3.3H6.8c-.2 0-.3-.1-.3-.3v-7.2zm3 1.5v4h1.5v-4H9.5zm4 0v4H15v-4h-1.5z"/>
          </svg>
          <span class="bag-fab-lab">Bag</span>
          <span class="bag-fab-badge" id="bag-badge" hidden>0</span>
        </button>
        <div id="toast" hidden></div>
        <div id="loot-toast" class="loot-toast" hidden aria-live="polite"></div>
      </main>

      <section class="hud-bars">
        <div class="bar-row2">
          <div class="bar" id="bar-energy-wrap">
            <div class="bar-lab"><span>Energy</span><span id="v-energy-lab">Sprint fuel</span></div>
            <div class="bar-bg"><div id="bar-energy" class="bar-fg en"></div></div>
          </div>
          <div class="bar">
            <div class="bar-lab"><span>Mana</span><span>Skills</span></div>
            <div class="bar-bg"><div id="bar-mana" class="bar-fg mn"></div></div>
          </div>
        </div>
      </section>

      <section class="hud-cta">
        <div class="cta-row">
          <button type="button" id="btn-sprint" class="btn-sprint" aria-pressed="false">
            <span class="btn-sprint-ico" aria-hidden="true">⚡</span>
            <span class="btn-sprint-txt">
              <span class="btn-sprint-title">Sprint</span>
              <span class="btn-sprint-sub">Hold · ×1.85 speed</span>
            </span>
          </button>
          <button type="button" id="btn-scanner" class="btn-primary">
            <span class="btn-primary-title">Upgrade Signal</span>
            <span class="btn-primary-sub"
              ><span id="v-cost">14</span> Signal · Lv <span id="v-scanner">0</span></span
            >
          </button>
        </div>
        <div class="btn-skills" id="skill-shortcuts">
          <button type="button" id="btn-hotfix" class="btn-chip" hidden>Burst</button>
          <button type="button" id="btn-summary" class="btn-chip" hidden>Area</button>
          <button type="button" id="btn-tracker" class="btn-chip" hidden>Ramp</button>
          <button type="button" id="btn-deep" class="btn-chip" hidden>Overdrive</button>
        </div>
      </section>

      <nav class="hud-nav" aria-label="Main">
        <button type="button" data-panel="skills" class="nav-btn">
          <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true"
            ><path
              fill="currentColor"
              d="M12 2L3 7v2h18V7L12 2zm-7 9v8h4v-6h6v6h4v-8H5z"
            /></svg
          >
          <span>Build</span>
        </button>
        <button type="button" data-panel="ship" class="nav-btn">
          <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true"
            ><path fill="currentColor" d="M4 18h16v2H4v-2zm2-4l4-8 2 4 4-6 4 10H6z"
          /></svg>
          <span>Ship</span>
        </button>
        <button type="button" data-panel="hub" class="nav-btn">
          <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true"
            ><path
              fill="currentColor"
              d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 5v5l4 2-.8 1.6L11 13V7h2z"
            /></svg
          >
          <span>Hub</span>
        </button>
        <button type="button" data-panel="meta" class="nav-btn">
          <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true"
            ><path
              fill="currentColor"
              d="M12 2a7 7 0 00-7 7c0 2.4 1.2 4.5 3 5.7V17h8v-2.3c1.8-1.2 3-3.3 3-5.7a7 7 0 00-7-7zm-2 17h4v2h-4v-2z"
            /></svg
          >
          <span>Boosts</span>
        </button>
        <button type="button" data-panel="settings" class="nav-btn">
          <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true"
            ><path
              fill="currentColor"
              d="M19.1 12.9a7.5 7.5 0 000-1.8l2-1.5-2-3.5-2.4 1a7.3 7.3 0 00-1.6-.9L14.8 3h-4l-.4 2.7a7.3 7.3 0 00-1.6.9l-2.4-1-2 3.5 2 1.5a7.5 7.5 0 000 1.8l-2 1.5 2 3.5 2.4-1c.5.4 1 .7 1.6.9l.4 2.7h4l.4-2.7c.6-.2 1.1-.5 1.6-.9l2.4 1 2-3.5-2-1.5zM12 15.5A3.5 3.5 0 1112 8a3.5 3.5 0 010 7.5z"
            /></svg
          >
          <span>Menu</span>
        </button>
      </nav>
    </div>

    <div id="sheet-root" class="sheet-root" hidden>
      <div class="sheet-backdrop" id="sheet-backdrop"></div>
      <div class="sheet">
        <div class="sheet-head">
          <h2 id="sheet-title">Build</h2>
          <button type="button" id="sheet-close">Close</button>
        </div>
        <div class="sheet-body">
          <section id="panel-skills" hidden>
            <div id="skills-body"></div>
          </section>
          <section id="panel-ship" hidden>
            <div id="ship-info" class="ship-stats" role="status"></div>
            <button type="button" id="btn-ship" class="btn-primary">
              <span class="btn-primary-title">Ship Notes → Rep</span>
              <span class="btn-primary-sub">Permanent</span>
            </button>
            <button type="button" id="btn-leave" class="btn-ghost" hidden>End Season</button>
          </section>
          <section id="panel-gear" hidden>
            <div id="gear-body"></div>
          </section>
          <section id="panel-hub" hidden>
            <div id="hub-body"></div>
          </section>
          <section id="panel-meta" hidden>
            <div id="meta-body"></div>
          </section>
          <section id="panel-settings" hidden>
            <div class="menu-block">
              <label class="chk"><input type="checkbox" id="chk-motion" /> Reduced motion</label>
              <label class="chk"><input type="checkbox" id="chk-sfx" checked /> Sound effects</label>
            </div>
            <p class="fine" id="v-attrs">Damage 0 · Crit 0 · Utility 0</p>
            <div class="section-lab">Premium</div>
            <div id="premium-body"></div>
            <button type="button" id="btn-wipe" class="btn-ghost">New Game</button>
          </section>
        </div>
      </div>
    </div>

    <div id="title-screen" class="modal title-modal">
      <div class="title-bg" aria-hidden="true">
        <span class="title-orb o1"></span>
        <span class="title-orb o2"></span>
        <span class="title-orb o3"></span>
        <span class="title-grid"></span>
      </div>
      <div class="modal-card title-card">
        <div class="title-mark" aria-hidden="true">
          <img src="./assets/apn-logo.svg" alt="" width="72" height="72" />
        </div>
        <h1 class="title-word">APN <span>Idle</span></h1>
        <button type="button" id="btn-start" class="btn-primary title-play">Play</button>
      </div>
    </div>

    <div id="offline-modal" class="modal" hidden>
      <div class="modal-card">
        <h2>While offline</h2>
        <pre id="offline-body" class="box"></pre>
        <button type="button" id="btn-offline-ok" class="btn-primary">Continue</button>
      </div>
    </div>

    <script type="module" src="./js/main.js?v=bag2"></script>
  </body>
</html>
